<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Chore Planning</title>
  <style>
    :root {
      --era-pink: #ff2e63;
      --era-orange: #ff7a1a;
      --era-purple: #7c3cff;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --card: rgba(10, 10, 10, 0.76);
      --border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: #050505;
      font-family: Arial, Helvetica, "Liberation Sans", sans-serif;
    }

    body {
      background:
        linear-gradient(115deg, rgba(0, 0, 0, 0.96) 0%, rgba(0, 0, 0, 0.86) 48%, rgba(0, 0, 0, 0.58) 100%),
        linear-gradient(135deg, #111111 0%, #050505 58%, #190815 100%);
    }

    .background-accent {
      position: fixed;
      right: -240px;
      bottom: -280px;
      width: 720px;
      height: 720px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 46, 99, 0.34), rgba(124, 60, 255, 0.18) 42%, transparent 68%);
      z-index: 0;
    }

    .brand-mark {
      position: fixed;
      top: 58px;
      left: 72px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 14px;
      letter-spacing: 0.18em;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .brand-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--era-pink);
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      width: 100vw;
      padding: 72px;
      display: grid;
      grid-template-columns: 0.78fr 1.42fr;
      align-items: center;
      gap: 64px;
    }

    .hero { padding-top: 48px; }

    .title {
      margin: 0;
      font-size: clamp(82px, 7vw, 122px);
      line-height: 0.9;
      letter-spacing: -0.08em;
      font-weight: 800;
      text-transform: uppercase;
      max-width: 780px;
    }

    .accent-line {
      width: 250px;
      height: 8px;
      margin-top: 36px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .subline {
      color: var(--muted);
      font-size: 26px;
      line-height: 1.25;
      margin-top: 34px;
      max-width: 520px;
    }

    .schedule-card {
      justify-self: end;
      width: 100%;
      min-height: 690px;
      padding: 44px;
      border: 1px solid var(--border);
      border-radius: 36px;
      background: var(--card);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.45);
      position: relative;
      overflow: hidden;
    }

    .schedule-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      border-radius: 36px 36px 0 0;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .weeks { display: grid; gap: 28px; }

    .week-block {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 26px;
      overflow: hidden;
      background: rgba(255,255,255,0.045);
    }

    .week-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 22px 26px 18px;
      background: rgba(255,255,255,0.055);
    }

    .week-title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .week-range {
      color: var(--muted);
      font-size: 18px;
      font-weight: 700;
    }

    .days { display: grid; grid-template-columns: repeat(5, 1fr); }

    .day {
      min-height: 142px;
      padding: 22px 18px 18px;
      border-right: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    .day:last-child { border-right: 0; }

    .day.today {
      background: linear-gradient(135deg, rgba(255, 46, 99, 0.34), rgba(255, 122, 26, 0.20));
      box-shadow: inset 0 0 0 2px rgba(255,46,99,0.72), 0 0 26px rgba(255,46,99,0.18);
    }

    .day-name {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .team {
      font-size: clamp(16px, 1.15vw, 22px);
      line-height: 1.05;
      letter-spacing: -0.045em;
      font-weight: 800;
      min-height: 58px;
      display: flex;
      align-items: center;
    }

    .status {
      color: var(--muted);
      font-size: 28px;
      line-height: 1.3;
      margin-top: 120px;
    }

    @media (max-width: 1400px) {
      .page { grid-template-columns: 1fr; gap: 30px; padding: 52px; }
      .hero { padding-top: 72px; }
      .subline { display: none; }
      .schedule-card { min-height: auto; }
      .title { font-size: 84px; }
    }
  </style>
</head>
<body>
  <div class="background-accent"></div>

  <div class="brand-mark">
    <div class="brand-dot"></div>
    We Are Era
  </div>

  <main class="page">
    <section class="hero" aria-label="Chore planning">
      <h1 class="title">Chore planning</h1>
      <div class="accent-line"></div>
      <div class="subline" id="today-copy"></div>
    </section>

    <section class="schedule-card" aria-label="Chore planning this week and next week">
      <div id="weeks" class="weeks">
        <div class="status">Loading schedule...</div>
      </div>
    </section>
  </main>

  <script>
    const ROSTER_URL = "roster.json";
    const DAY_KEYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
    let roster = [];

    function pad(n) {
      return n < 10 ? "0" + n : "" + n;
    }

    function dateFromISO(value) {
      const parts = String(value).split("-").map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function addDays(date, days) {
      const d = new Date(date.getTime());
      d.setDate(d.getDate() + days);
      return d;
    }

    function formatDate(date) {
      return pad(date.getDate()) + "-" + pad(date.getMonth() + 1);
    }

    function dateKey(date) {
      return date.getFullYear() + "-" + pad(date.getMonth() + 1) + "-" + pad(date.getDate());
    }

    function startOfISOWeek(date) {
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function isoWeek(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function findRosterIndexForWeekStart(weekStart) {
      const key = dateKey(weekStart);
      return roster.findIndex(item => item.start === key);
    }

    function renderWeek(item, label, today) {
      const start = dateFromISO(item.start);
      const end = addDays(start, 4);
      let dayHtml = "";

      DAY_KEYS.forEach((key, index) => {
        const dayDate = addDays(start, index);
        const isToday = dateKey(dayDate) === dateKey(today);
        const team = item.days && item.days[key] ? item.days[key] : "No chore duty";

        dayHtml += `
          <article class="day ${isToday ? "today" : ""}" data-date="${dateKey(dayDate)}">
            <div class="day-name">${key} · ${formatDate(dayDate)}</div>
            <div class="team">${escapeHtml(team)}</div>
          </article>`;
      });

      const quarter = item.quarter ? ` · ${escapeHtml(item.quarter)}` : "";

      return `
        <section class="week-block">
          <header class="week-head">
            <h2 class="week-title">${label} · Week ${isoWeek(start)}</h2>
            <div class="week-range">${formatDate(start)} to ${formatDate(end)}${quarter}</div>
          </header>
          <div class="days">${dayHtml}</div>
        </section>`;
    }

    function render() {
      const today = new Date();
      const weekStart = startOfISOWeek(today);
      const currentIndex = findRosterIndexForWeekStart(weekStart);
      const container = document.getElementById("weeks");
      const copy = document.getElementById("today-copy");

      copy.textContent = "";

      if (currentIndex === -1) {
        container.innerHTML = `<div class="status">No schedule found for the week starting ${dateKey(weekStart)}.</div>`;
        return;
      }

      const current = roster[currentIndex];
      const next = roster[currentIndex + 1];

      let html = renderWeek(current, "This Week", today);
      if (next) {
        html += renderWeek(next, "Next Week", today);
      } else {
        html += `<div class="status">No schedule found for next week.</div>`;
      }

      container.innerHTML = html;
    }

    async function loadRoster() {
      const container = document.getElementById("weeks");

      try {
        const response = await fetch(ROSTER_URL + "?v=" + Date.now(), { cache: "no-store" });
        if (!response.ok) throw new Error("Roster could not be loaded");
        roster = await response.json();
        roster.sort((a, b) => a.start.localeCompare(b.start));
        render();
      } catch (error) {
        container.innerHTML = `<div class="status">Schedule could not be loaded. Check if roster.json is available next to this HTML file.</div>`;
      }
    }

    loadRoster();
    setInterval(render, 60 * 1000);
    setInterval(loadRoster, 30 * 60 * 1000);
    setTimeout(function () { window.location.reload(); }, 6 * 60 * 60 * 1000);
  </script>
</body>
</html>
